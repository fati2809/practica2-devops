name: Pipeline CI/CD Completo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/fati2809/practica2-devops
  IMAGE_TAG: ${{ github.sha }}

jobs:

  sonarqube:
    name: "1 · Análisis SonarQube"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Escanear con SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=practica-devops0
            -Dsonar.qualitygate.wait=false

  k6-load-test:
    name: "2 · Prueba de Carga K6"
    runs-on: ubuntu-latest
    needs: sonarqube

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias Node
        run: npm install

      - name: Build del proyecto
        run: npm run build || true

      - name: Instalar K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Iniciar app y ejecutar K6
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 10
          curl -f http://localhost:3000/health || exit 1
          k6 run --env APP_URL=http://localhost:3000 tests/load-test.js
          EXIT_CODE=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE

  docker-build:
    name: "3 · Empaquetar con Docker"
    runs-on: ubuntu-latest
    needs: k6-load-test

    steps:
      - uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy:
    name: "4 · Despliegue en GCP"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Desplegar via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io \
              -u fati2809 --password-stdin

            docker stop practica2-devops 2>/dev/null || true
            docker rm   practica2-devops 2>/dev/null || true

            docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            docker run -d \
              --name practica2-devops \
              --restart unless-stopped \
              -p 80:3000 \
              ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            sleep 5
            curl -f http://localhost:3000/health || exit 1
            echo "✅ Despliegue exitoso"
