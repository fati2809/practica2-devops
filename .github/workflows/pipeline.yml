name: Pipeline CI/CD Completo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/fati2809/practica2-devops
  IMAGE_TAG: ${{ github.sha }}

jobs:

  sonarqube:
    name: "1 · Análisis SonarQube"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Escanear con SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-devops
            -Dsonar.qualitygate.wait=true

  k6-load-test:
    name: "2 · Prueba de Carga K6"
    runs-on: ubuntu-latest
    needs: sonarqube

    steps:
      - uses: actions/checkout@v3

      - name: Instalar dependencias Node
        run: npm install

      - name: Build del proyecto
        run: npm run build

      - name: Iniciar app en background
        run: |
          node server.js &
          sleep 5
          curl -f http://localhost:3000/health || exit 1

      - name: Ejecutar prueba K6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load-test.js
        env:
          APP_URL: http://localhost:3000

  docker-build:
    name: "3 · Empaquetar con Docker"
    runs-on: ubuntu-latest
    needs: k6-load-test

    steps:
      - uses: actions/checkout@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy:
    name: "4 · Despliegue en GCP"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Desplegar via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io \
              -u fati2809 --password-stdin

            docker stop practica2-devops 2>/dev/null || true
            docker rm   practica2-devops 2>/dev/null || true

            docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            docker run -d \
              --name practica2-devops \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            sleep 5
            curl -f http://localhost:3000/health || exit 1
            echo "✅ Despliegue exitoso"